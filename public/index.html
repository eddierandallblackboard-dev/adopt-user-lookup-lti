<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Adopt User Lookup</title>
<link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="dot" id="statusDot"></span>
      <h1>Adopt User <span>Lookup</span></h1>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-lookup">UUID Lookup</button>
    <button class="tab-btn" data-tab="tab-adopt">Adopt Segments</button>
  </div>

  <!-- ══ TAB: UUID Lookup ══ -->
  <div class="tab-pane active" id="tab-lookup">

    <div class="error-bar" id="errorBar"></div>

    <!-- Single UUID lookup -->
    <div class="panel">
      <h2>UUID → Username Lookup</h2>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <div class="field" style="flex:1;margin-bottom:0">
          <label>Blackboard UUID</label>
          <input type="text" id="uuidInput" placeholder="Paste a UUID…" style="font-family:'Courier New',monospace;font-size:13px"/>
        </div>
        <button class="btn-primary" id="uuidLookupBtn">Look Up →</button>
        <button class="btn-ghost" id="uuidResetBtn">↺ Reset</button>
      </div>
      <div id="uuidResult" style="margin-top:8px;font-size:13px;min-height:18px"></div>
    </div>

    <!-- Batch CSV lookup -->
    <div class="panel">
      <h2>Data to Process</h2>
      <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
        <div class="field" style="width:100%;margin-bottom:0">
          <label>Upload Email CSV</label>
          <div class="dropzone" id="dropzone">
            <div class="drop-inner" id="dropInner">
              <div class="drop-icon">⬆</div>
              <div class="drop-text">Drop CSV or click to browse</div>
              <div class="drop-sub">Must contain an email column</div>
            </div>
          </div>
          <input type="file" id="fileInput" accept=".csv,text/csv" style="display:none"/>
        </div>
        <div class="field" id="colSelectorWrap" style="visibility:hidden;width:100%">
          <label>Email Column</label>
          <select id="colSelector"></select>
        </div>
        <div class="actions" style="justify-content:center;width:100%;display:flex;margin-top:2px">
          <button class="btn-primary" id="runBtn" disabled>Process Emails →</button>
          <button class="btn-ghost" id="stopBtn" style="display:none">■ Stop</button>
          <button class="btn-ghost" id="resetBtn">↺ Reset</button>
        </div>
      </div>
    </div>

    <!-- Results -->
    <div class="panel hidden" id="resultsPanel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span id="progressTitle" style="font-size:13px;font-weight:700;color:#374151;flex:1"></span>
        <button class="btn-dl hidden" id="dlBtn">⬇ Download</button>
      </div>
      <div class="prog-track"><div class="prog-bar" id="progBar"></div></div>
      <div class="results-top-row">
        <div class="stat-card"><div class="num" id="statFound" style="color:#15803d">0</div><div class="lbl">Found</div></div>
        <div class="stat-card"><div class="num" id="statMissed" style="color:#b45309">0</div><div class="lbl">Not Found</div></div>
        <div class="stat-card"><div class="num" id="statSkipped" style="color:#6b7280">0</div><div class="lbl">Skipped</div></div>
        <div class="stat-card"><div class="num" id="statErrors" style="color:#b91c1c">0</div><div class="lbl">Errors</div></div>
      </div>
      <div id="feedPanel">
        <div class="feed" id="feedBody"></div>
      </div>
      <div class="hidden" id="tablePanel">
        <div class="tbl-wrap tall">
          <table style="width:100%">
            <thead><tr><th>Email</th><th>UUID</th><th>Status</th></tr></thead>
            <tbody id="resultsBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Adopt push panel -->
    <div class="panel" id="adoptPanel" style="display:none">
      <h2>Create in Blackboard Adopt</h2>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div class="adopt-row">
          <div class="field">
            <label>Adopt API Host</label>
            <input type="url" id="adoptHost" placeholder="https://app.pendo.io" value="https://app.pendo.io"/>
          </div>
          <div class="field">
            <label>Integration Key</label>
            <input type="password" id="adoptKey" placeholder="Paste your integration key"/>
          </div>
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Blackboard Site ID <span style="font-weight:400;color:#9ca3af;font-size:11px">— BB Admin → Cloud Management → Adopt → Site UUID</span></label>
          <input type="text" id="adoptSiteId" placeholder="e.g. baed9e72-f471-4334-9064-53ce81bd4a56" style="font-family:'Courier New',monospace;font-size:12px"/>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap" id="adoptModeLabelCreate">
            <input type="radio" name="adoptMode" id="adoptModeCreate" value="create" checked/>Create new segment
          </label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;margin-left:16px;display:none" id="adoptModeLabelUpdate">
            <input type="radio" name="adoptMode" id="adoptModeUpdate" value="update"/>Update existing segment
          </label>
        </div>
        <div id="adoptCreateRow" class="adopt-row">
          <div class="field">
            <label>Segment Name</label>
            <input type="text" id="adoptSegmentName" placeholder="e.g. Targeted Users – March 2026"/>
          </div>
          <button class="btn-primary" id="adoptPushBtn" style="flex-shrink:0">Create Segment →</button>
        </div>
        <div id="adoptUpdateRow" style="display:none;flex-direction:column;gap:6px">
          <div class="field" style="margin-bottom:0">
            <label>Existing Segment</label>
            <select id="adoptSegmentSelect" style="width:100%"><option value="">— Select existing segment to update —</option></select>
          </div>
          <div><button class="btn-primary" id="adoptUpdateBtn">Update Segment →</button></div>
        </div>
        <div id="adoptMembersPanel1" class="hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span id="adoptMembers1Title" style="font-size:13px;font-weight:700;color:#374151"></span>
            <span id="adoptMembers1Count" style="font-size:12px;color:#6b7280"></span>
          </div>
          <div class="tbl-wrap short">
            <table style="width:100%">
              <thead><tr><th>#</th><th>UUID</th><th>BB Username</th></tr></thead>
              <tbody id="adoptMembers1Body"></tbody>
            </table>
          </div>
        </div>
        <div class="adopt-status" id="adoptStatus"></div>
      </div>
    </div>

  </div><!-- end tab-lookup -->

  <!-- ══ TAB: Adopt Segments ══ -->
  <div class="tab-pane" id="tab-adopt">

    <div class="panel">
      <h2>Adopt Connection</h2>
      <div class="adopt-row">
        <div class="field">
          <label>Adopt API Host</label>
          <input type="url" id="adoptHost2" placeholder="https://app.pendo.io" value="https://app.pendo.io"/>
        </div>
        <div class="field">
          <label>Integration Key</label>
          <input type="password" id="adoptKey2" placeholder="Paste your integration key"/>
        </div>
        <button class="btn-primary" id="loadSegmentsBtn" style="flex-shrink:0">Load Segments</button>
      </div>
      <div class="adopt-status" id="adoptStatus2"></div>
    </div>

    <div class="panel" id="segmentSelectorPanel" style="display:none">
      <h2>Segment</h2>
      <div class="adopt-row">
        <div class="field" style="flex:1;margin-bottom:0">
          <select id="segmentSelect"><option value="">— choose a segment —</option></select>
        </div>
        <button class="btn-primary" id="showMembersBtn" disabled>Show Members</button>
      </div>
      <span id="segCount" style="font-size:12px;color:#6b7280;margin-top:4px;display:block"></span>
    </div>

    <div class="panel hidden" id="segmentMembersPanel">
      <h2 id="segmentMembersTitle"></h2>
      <div class="tbl-wrap tall">
        <table style="width:100%">
          <thead><tr><th>#</th><th>UUID</th><th>BB Username</th></tr></thead>
          <tbody id="segmentMembersBody"></tbody>
        </table>
      </div>
    </div>

  </div><!-- end tab-adopt -->

</div><!-- end wrap -->

<script src="/js/app.js"></script>
</body>
</html>
